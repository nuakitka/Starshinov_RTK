all:
  vars:
    ansible_user: ansible
    ansible_ssh_private_key_file: /tmp/ansible_key
    ansible_python_interpreter: /usr/bin/python3
    vip_address: 172.30.0.10
    haproxy_metrics_port: 8404
  children:
    loadbalancers:
      hosts:
        lb1:
          ansible_host: 172.30.0.11
          keepalived_priority: 150
          keepalived_state: MASTER
          keepalived_peer: 172.30.0.12
        lb2:
          ansible_host: 172.30.0.12
          keepalived_priority: 100
          keepalived_state: BACKUP
          keepalived_peer: 172.30.0.11
    backends:
      hosts:
        backend1:
          ansible_host: 172.30.0.21
          backend_label: "Бэкенд 1"
        backend2:
          ansible_host: 172.30.0.22
          backend_label: "Бэкенд 2"
    app_nodes:
      children:
        loadbalancers: {}
        backends: {}
